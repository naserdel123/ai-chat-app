<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>نيورا AI — مساعدك الذكي</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #080c14;
      --surface: #0d1420;
      --surface2: #111827;
      --border: rgba(99,179,237,0.12);
      --accent: #38bdf8;
      --accent2: #818cf8;
      --accent3: #f472b6;
      --text: #e2e8f0;
      --text-muted: #64748b;
      --user-bubble: linear-gradient(135deg, #1e40af, #4f46e5);
      --ai-bubble: #0f1d2e;
      --glow: 0 0 40px rgba(56,189,248,0.15);
      --radius: 18px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      overflow: hidden;
      position: relative;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 0%, rgba(56,189,248,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(129,140,248,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 50% 50%, rgba(244,114,182,0.03) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* Sidebar */
    .sidebar {
      width: 280px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 10;
      flex-shrink: 0;
    }

    .sidebar-header {
      padding: 28px 20px 20px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      box-shadow: 0 0 20px rgba(56,189,248,0.3);
    }

    .logo-text {
      font-size: 22px;
      font-weight: 900;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    .new-chat-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, rgba(56,189,248,0.15), rgba(129,140,248,0.15));
      border: 1px solid rgba(56,189,248,0.3);
      border-radius: 12px;
      color: var(--accent);
      font-family: 'Cairo', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .new-chat-btn:hover {
      background: linear-gradient(135deg, rgba(56,189,248,0.25), rgba(129,140,248,0.25));
      box-shadow: 0 0 20px rgba(56,189,248,0.2);
      transform: translateY(-1px);
    }

    .sidebar-nav {
      flex: 1;
      padding: 16px 12px;
      overflow-y: auto;
    }

    .nav-section-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 8px 8px 6px;
      margin-top: 8px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 2px;
    }

    .nav-item:hover, .nav-item.active {
      background: rgba(56,189,248,0.08);
      color: var(--accent);
    }

    .nav-item.active {
      border: 1px solid rgba(56,189,248,0.2);
    }

    .sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
    }

    /* Main area */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 1;
      overflow: hidden;
    }

    /* Tab bar */
    .tab-bar {
      display: flex;
      gap: 4px;
      padding: 16px 24px 0;
      border-bottom: 1px solid var(--border);
      background: rgba(13,20,32,0.8);
      backdrop-filter: blur(10px);
    }

    .tab {
      padding: 10px 20px;
      border-radius: 10px 10px 0 0;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-muted);
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid transparent;
      border-bottom: none;
      position: relative;
      bottom: -1px;
    }

    .tab.active {
      background: var(--surface2);
      color: var(--accent);
      border-color: var(--border);
      border-bottom-color: var(--surface2);
    }

    .tab:hover:not(.active) {
      color: var(--text);
      background: rgba(255,255,255,0.04);
    }

    /* Chat panel */
    .panel {
      display: none;
      flex: 1;
      flex-direction: column;
      overflow: hidden;
    }

    .panel.active {
      display: flex;
    }

    /* Messages area */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: rgba(56,189,248,0.2); border-radius: 2px; }

    /* Welcome screen */
    .welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      text-align: center;
      animation: fadeIn 0.6s ease;
    }

    .welcome-orb {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, var(--accent), var(--accent2), var(--accent3));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      box-shadow: 0 0 60px rgba(56,189,248,0.4), 0 0 120px rgba(129,140,248,0.2);
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 60px rgba(56,189,248,0.4); }
      50% { transform: scale(1.05); box-shadow: 0 0 80px rgba(56,189,248,0.6); }
    }

    .welcome h2 {
      font-size: 28px;
      font-weight: 900;
      background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .welcome p { color: var(--text-muted); font-size: 16px; }

    .suggestion-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-top: 8px;
      max-width: 600px;
    }

    .chip {
      padding: 10px 18px;
      background: rgba(56,189,248,0.08);
      border: 1px solid rgba(56,189,248,0.2);
      border-radius: 100px;
      font-size: 13px;
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Cairo', sans-serif;
    }

    .chip:hover {
      background: rgba(56,189,248,0.15);
      border-color: rgba(56,189,248,0.4);
      color: var(--accent);
      transform: translateY(-2px);
    }

    /* Message bubbles */
    .message {
      display: flex;
      gap: 14px;
      animation: slideIn 0.35s ease;
      max-width: 85%;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user { align-self: flex-end; flex-direction: row-reverse; }
    .message.ai { align-self: flex-start; }

    .avatar {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .message.user .avatar {
      background: linear-gradient(135deg, #1e40af, #4f46e5);
      box-shadow: 0 0 15px rgba(79,70,229,0.3);
    }

    .message.ai .avatar {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: 0 0 15px rgba(56,189,248,0.3);
    }

    .bubble {
      padding: 14px 18px;
      border-radius: var(--radius);
      font-size: 15px;
      line-height: 1.7;
      max-width: 100%;
    }

    .message.user .bubble {
      background: var(--user-bubble);
      border-radius: var(--radius) 4px var(--radius) var(--radius);
      box-shadow: 0 4px 20px rgba(79,70,229,0.2);
    }

    .message.ai .bubble {
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-radius: 4px var(--radius) var(--radius) var(--radius);
      box-shadow: var(--glow);
    }

    .bubble pre {
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(56,189,248,0.15);
      border-radius: 10px;
      padding: 14px;
      overflow-x: auto;
      margin: 10px 0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      direction: ltr;
      text-align: left;
    }

    .bubble code {
      font-family: 'JetBrains Mono', monospace;
      background: rgba(56,189,248,0.1);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 13px;
    }

    /* Image in chat */
    .image-result {
      max-width: 480px;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: var(--glow);
      animation: slideIn 0.4s ease;
    }

    .image-result img {
      width: 100%;
      display: block;
      transition: transform 0.3s ease;
    }

    .image-result img:hover { transform: scale(1.02); }

    .image-caption {
      padding: 10px 14px;
      background: var(--ai-bubble);
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .image-download {
      color: var(--accent);
      text-decoration: none;
      font-size: 12px;
      font-weight: 600;
    }

    /* Typing indicator */
    .typing {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 14px 18px;
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-radius: 4px var(--radius) var(--radius) var(--radius);
      width: fit-content;
    }

    .typing span {
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; background: var(--accent2); }
    .typing span:nth-child(3) { animation-delay: 0.4s; background: var(--accent3); }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
      30% { transform: translateY(-8px); opacity: 1; }
    }

    /* Input area */
    .input-area {
      padding: 16px 24px 20px;
      background: rgba(13,20,32,0.9);
      backdrop-filter: blur(10px);
      border-top: 1px solid var(--border);
    }

    .input-wrapper {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px 14px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-wrapper:focus-within {
      border-color: rgba(56,189,248,0.4);
      box-shadow: 0 0 20px rgba(56,189,248,0.1);
    }

    .input-wrapper textarea {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'Cairo', sans-serif;
      font-size: 15px;
      resize: none;
      max-height: 140px;
      min-height: 24px;
      line-height: 1.6;
      direction: rtl;
    }

    .input-wrapper textarea::placeholder { color: var(--text-muted); }

    .send-btn {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
      font-size: 18px;
    }

    .send-btn:hover { transform: scale(1.08); box-shadow: 0 0 20px rgba(56,189,248,0.4); }
    .send-btn:active { transform: scale(0.95); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* Image panel */
    .image-panel-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 24px;
      gap: 20px;
      overflow-y: auto;
    }

    .style-selector {
      display: flex;
      gap: 12px;
    }

    .style-card {
      flex: 1;
      padding: 16px 12px;
      background: var(--surface2);
      border: 2px solid var(--border);
      border-radius: 14px;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
      font-family: 'Cairo', sans-serif;
    }

    .style-card .style-icon { font-size: 28px; margin-bottom: 8px; }
    .style-card .style-name { font-size: 14px; font-weight: 700; color: var(--text); }
    .style-card .style-desc { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

    .style-card.selected {
      border-color: var(--accent);
      background: rgba(56,189,248,0.08);
      box-shadow: 0 0 20px rgba(56,189,248,0.15);
    }

    .style-card:hover:not(.selected) {
      border-color: rgba(56,189,248,0.3);
      transform: translateY(-2px);
    }

    .image-input-section {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .image-input-section label {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-muted);
    }

    .image-textarea {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      color: var(--text);
      font-family: 'Cairo', sans-serif;
      font-size: 15px;
      resize: none;
      height: 100px;
      outline: none;
      transition: border-color 0.2s;
      direction: rtl;
    }

    .image-textarea:focus {
      border-color: rgba(56,189,248,0.4);
      box-shadow: 0 0 15px rgba(56,189,248,0.1);
    }

    .generate-btn {
      padding: 16px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 14px;
      color: #000;
      font-family: 'Cairo', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .generate-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(56,189,248,0.4); }
    .generate-btn:active { transform: translateY(0); }
    .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .image-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    .gallery-item {
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--surface2);
      transition: transform 0.2s, box-shadow 0.2s;
      animation: slideIn 0.4s ease;
    }

    .gallery-item:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(56,189,248,0.2);
    }

    .gallery-item img { width: 100%; display: block; aspect-ratio: 1; object-fit: cover; }

    .gallery-item-footer {
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .gallery-style-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 100px;
    }

    .badge-realistic { background: rgba(56,189,248,0.15); color: var(--accent); }
    .badge-anime { background: rgba(244,114,182,0.15); color: var(--accent3); }
    .badge-animation { background: rgba(129,140,248,0.15); color: var(--accent2); }

    /* Loading spinner for image */
    .image-loading {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 14px;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(56,189,248,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .spinner-text { color: var(--text-muted); font-size: 14px; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Error toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #1a0a0a;
      border: 1px solid rgba(239,68,68,0.4);
      color: #fca5a5;
      padding: 12px 24px;
      border-radius: 100px;
      font-size: 14px;
      font-weight: 600;
      z-index: 1000;
      transition: transform 0.3s ease;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .style-selector { flex-direction: column; }
    }
  </style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-header">
    <div class="logo">
      <div class="logo-icon">✦</div>
      <div class="logo-text">نيورا AI</div>
    </div>
    <button class="new-chat-btn" onclick="clearChat()">
      ✏️ محادثة جديدة
    </button>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section-title">الأدوات</div>
    <div class="nav-item active" onclick="switchTab('chat')">💬 المحادثة</div>
    <div class="nav-item" onclick="switchTab('image')">🎨 إنشاء صور</div>
    <div class="nav-section-title">معلومات</div>
    <div class="nav-item">🔑 GPT-4o Mini</div>
    <div class="nav-item">🖼️ DALL·E 3 HD</div>
  </nav>
  <div class="sidebar-footer">مدعوم بواجهة OpenAI API</div>
</aside>

<!-- Main -->
<main class="main">
  <!-- Tab bar -->
  <div class="tab-bar">
    <div class="tab active" id="tab-chat" onclick="switchTab('chat')">💬 المحادثة</div>
    <div class="tab" id="tab-image" onclick="switchTab('image')">🎨 إنشاء صور</div>
  </div>

  <!-- Chat panel -->
  <div class="panel active" id="panel-chat">
    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="welcome-orb">✦</div>
        <h2>مرحباً، كيف يمكنني مساعدتك؟</h2>
        <p>اسألني أي شيء — أنا هنا للمساعدة دائماً</p>
        <div class="suggestion-chips">
          <div class="chip" onclick="sendSuggestion('ما هي أحدث اتجاهات الذكاء الاصطناعي؟')">🤖 اتجاهات الذكاء الاصطناعي</div>
          <div class="chip" onclick="sendSuggestion('اكتب لي قصيدة عن الفضاء')">🌌 قصيدة عن الفضاء</div>
          <div class="chip" onclick="sendSuggestion('علمني برمجة Python للمبتدئين')">💻 تعلم Python</div>
          <div class="chip" onclick="sendSuggestion('ما هي نصائحك لزيادة الإنتاجية؟')">⚡ نصائح الإنتاجية</div>
        </div>
      </div>
    </div>
    <div class="input-area">
      <div class="input-wrapper">
        <textarea id="chat-input" placeholder="اكتب رسالتك هنا..." rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMessage()">➤</button>
      </div>
    </div>
  </div>

  <!-- Image panel -->
  <div class="panel" id="panel-image">
    <div class="image-p
