<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>نيورا AI — مساعدك الذكي</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #080c14;
      --surface: #0d1420;
      --surface2: #111827;
      --border: rgba(99,179,237,0.12);
      --accent: #38bdf8;
      --accent2: #818cf8;
      --accent3: #f472b6;
      --text: #e2e8f0;
      --text-muted: #64748b;
      --user-bubble: linear-gradient(135deg, #1e40af, #4f46e5);
      --ai-bubble: #0f1d2e;
      --glow: 0 0 40px rgba(56,189,248,0.15);
      --radius: 18px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      width: 100%;
      font-family: 'Cairo', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* Use dvh for mobile browsers that have address bars */
    .app-shell {
      display: flex;
      width: 100%;
      height: 100dvh; /* dynamic viewport height — key fix for mobile */
      position: relative;
      background: var(--bg);
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 0%, rgba(56,189,248,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(129,140,248,0.06) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Sidebar ─────────────────────────────────── */
    .sidebar {
      width: 260px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 10;
      flex-shrink: 0;
    }

    .sidebar-header { padding: 24px 18px 18px; border-bottom: 1px solid var(--border); }

    .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
    .logo-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      box-shadow: 0 0 20px rgba(56,189,248,0.3);
    }
    .logo-text {
      font-size: 20px; font-weight: 900;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .new-chat-btn {
      width: 100%; padding: 11px;
      background: linear-gradient(135deg, rgba(56,189,248,0.15), rgba(129,140,248,0.15));
      border: 1px solid rgba(56,189,248,0.3);
      border-radius: 12px;
      color: var(--accent); font-family: 'Cairo', sans-serif;
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: all 0.25s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .new-chat-btn:hover { background: linear-gradient(135deg, rgba(56,189,248,0.25), rgba(129,140,248,0.25)); }

    .sidebar-nav { flex: 1; padding: 14px 10px; overflow-y: auto; }
    .nav-section-title {
      font-size: 10px; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 1px;
      padding: 8px 8px 6px; margin-top: 6px;
    }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 10px;
      cursor: pointer; transition: all 0.2s;
      font-size: 14px; color: var(--text-muted); margin-bottom: 2px;
    }
    .nav-item:hover, .nav-item.active {
      background: rgba(56,189,248,0.08); color: var(--accent);
    }
    .nav-item.active { border: 1px solid rgba(56,189,248,0.2); }
    .sidebar-footer { padding: 14px 18px; border-top: 1px solid var(--border); font-size: 11px; color: var(--text-muted); text-align: center; }

    /* ── Main ───────────────────────────────────── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      z-index: 1;
      min-width: 0;
      /* Critical: let main fill remaining height and NOT overflow */
      overflow: hidden;
    }

    /* ── Tab bar ────────────────────────────────── */
    .tab-bar {
      display: flex; gap: 4px;
      padding: 14px 20px 0;
      border-bottom: 1px solid var(--border);
      background: rgba(13,20,32,0.95);
      flex-shrink: 0; /* never shrink */
    }
    .tab {
      padding: 10px 18px;
      border-radius: 10px 10px 0 0;
      cursor: pointer; font-size: 14px; font-weight: 600;
      color: var(--text-muted); transition: all 0.2s;
      display: flex; align-items: center; gap: 8px;
      border: 1px solid transparent; border-bottom: none;
      position: relative; bottom: -1px;
    }
    .tab.active {
      background: var(--surface2); color: var(--accent);
      border-color: var(--border); border-bottom-color: var(--surface2);
    }
    .tab:hover:not(.active) { color: var(--text); background: rgba(255,255,255,0.04); }

    /* ── Panels ─────────────────────────────────── */
    .panel {
      display: none;
      flex: 1;
      flex-direction: column;
      min-height: 0; /* critical for flex children to scroll */
      overflow: hidden;
    }
    .panel.active { display: flex; }

    /* ── Messages ───────────────────────────────── */
    .messages {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      scroll-behavior: smooth;
      min-height: 0; /* critical */
    }
    .messages::-webkit-scrollbar { width: 3px; }
    .messages::-webkit-scrollbar-thumb { background: rgba(56,189,248,0.2); border-radius: 2px; }

    /* ── Welcome ────────────────────────────────── */
    .welcome {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px; text-align: center; padding: 20px;
      animation: fadeIn 0.5s ease;
    }
    .welcome-orb {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, var(--accent), var(--accent2), var(--accent3));
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px;
      box-shadow: 0 0 50px rgba(56,189,248,0.4);
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { transform: scale(1); box-shadow: 0 0 50px rgba(56,189,248,0.4); }
      50%      { transform: scale(1.05); box-shadow: 0 0 70px rgba(56,189,248,0.6); }
    }
    .welcome h2 {
      font-size: 24px; font-weight: 900;
      background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .welcome p { color: var(--text-muted); font-size: 15px; }
    .suggestion-chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 6px; max-width: 560px; }
    .chip {
      padding: 9px 16px;
      background: rgba(56,189,248,0.08); border: 1px solid rgba(56,189,248,0.2);
      border-radius: 100px; font-size: 13px; color: var(--text);
      cursor: pointer; transition: all 0.2s; font-family: 'Cairo', sans-serif;
    }
    .chip:hover { background: rgba(56,189,248,0.18); color: var(--accent); transform: translateY(-2px); }

    /* ── Message bubbles ────────────────────────── */
    .message {
      display: flex; gap: 12px;
      animation: slideIn 0.3s ease;
      max-width: 88%;
    }
    @keyframes slideIn { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn  { from { opacity:0; transform:translateY(8px);  } to { opacity:1; transform:translateY(0); } }

    .message.user { align-self: flex-end; flex-direction: row-reverse; }
    .message.ai   { align-self: flex-start; }

    .avatar {
      width: 36px; height: 36px; border-radius: 11px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; flex-shrink: 0;
    }
    .message.user .avatar { background: linear-gradient(135deg,#1e40af,#4f46e5); }
    .message.ai   .avatar { background: linear-gradient(135deg, var(--accent), var(--accent2)); }

    .bubble {
      padding: 12px 16px; border-radius: var(--radius);
      font-size: 15px; line-height: 1.75; max-width: 100%;
      word-break: break-word;
    }
    .message.user .bubble {
      background: var(--user-bubble);
      border-radius: var(--radius) 4px var(--radius) var(--radius);
      box-shadow: 0 4px 16px rgba(79,70,229,0.2);
    }
    .message.ai .bubble {
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-radius: 4px var(--radius) var(--radius) var(--radius);
    }
    .bubble pre {
      background: rgba(0,0,0,0.4); border: 1px solid rgba(56,189,248,0.15);
      border-radius: 8px; padding: 12px; overflow-x: auto;
      margin: 8px 0; font-family: 'JetBrains Mono', monospace;
      font-size: 12px; direction: ltr; text-align: left;
    }
    .bubble code {
      font-family: 'JetBrains Mono', monospace;
      background: rgba(56,189,248,0.1); padding: 2px 5px; border-radius: 4px; font-size: 12px;
    }

    /* ── Typing indicator ───────────────────────── */
    .typing {
      display: flex; align-items: center; gap: 5px;
      padding: 12px 16px; background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-radius: 4px var(--radius) var(--radius) var(--radius);
      width: fit-content;
    }
    .typing span {
      width: 7px; height: 7px; background: var(--accent);
      border-radius: 50%; animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; background: var(--accent2); }
    .typing span:nth-child(3) { animation-delay: 0.4s; background: var(--accent3); }
    @keyframes bounce { 0%,60%,100% { transform:translateY(0); opacity:0.5; } 30% { transform:translateY(-7px); opacity:1; } }

    /* ── Input area ─────────────────────────────── */
    .input-area {
      flex-shrink: 0; /* never shrink! */
      padding: 12px 16px;
      padding-bottom: calc(12px + env(safe-area-inset-bottom)); /* iPhone notch fix */
      background: rgba(8,12,20,0.97);
      border-top: 1px solid var(--border);
    }
    .input-wrapper {
      display: flex; gap: 10px; align-items: flex-end;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 12px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-wrapper:focus-within {
      border-color: rgba(56,189,248,0.5);
      box-shadow: 0 0 20px rgba(56,189,248,0.1);
    }
    .input-wrapper textarea {
      flex: 1; background: none; border: none; outline: none;
      color: var(--text); font-family: 'Cairo', sans-serif;
      font-size: 15px; resize: none;
      max-height: 120px; min-height: 24px;
      line-height: 1.6; direction: rtl;
    }
    .input-wrapper textarea::placeholder { color: var(--text-muted); }
    .send-btn {
      width: 38px; height: 38px; flex-shrink: 0;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 10px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 17px; transition: all 0.2s;
    }
    .send-btn:hover  { transform: scale(1.08); box-shadow: 0 0 18px rgba(56,189,248,0.4); }
    .send-btn:active { transform: scale(0.93); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

    /* ── Image panel ────────────────────────────── */
    .image-panel-content {
      flex: 1; display: flex; flex-direction: column;
      padding: 20px; gap: 18px; overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      min-height: 0;
    }
    .style-selector { display: flex; gap: 10px; }
    .style-card {
      flex: 1; padding: 14px 10px;
      background: var(--surface2); border: 2px solid var(--border);
      border-radius: 14px; cursor: pointer; text-align: center;
      transition: all 0.2s; font-family: 'Cairo', sans-serif;
    }
    .style-card .style-icon  { font-size: 26px; margin-bottom: 6px; }
    .style-card .style-name  { font-size: 13px; font-weight: 700; color: var(--text); }
    .style-card .style-desc  { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
    .style-card.selected { border-color: var(--accent); background: rgba(56,189,248,0.08); }
    .style-card:hover:not(.selected) { border-color: rgba(56,189,248,0.3); transform: translateY(-2px); }

    .image-input-section { display: flex; flex-direction: column; gap: 10px; }
    .image-input-section label { font-size: 13px; font-weight: 600; color: var(--text-muted); }
    .image-textarea {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px; color: var(--text);
      font-family: 'Cairo', sans-serif; font-size: 15px;
      resize: none; height: 90px; outline: none; direction: rtl;
      transition: border-color 0.2s;
    }
    .image-textarea:focus { border-color: rgba(56,189,248,0.4); }

    .generate-btn {
      padding: 15px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 13px;
      color: #000; font-family: 'Cairo', sans-serif;
      font-size: 15px; font-weight: 700; cursor: pointer;
      transition: all 0.3s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .generate-btn:hover  { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(56,189,248,0.4); }
    .generate-btn:active { transform: translateY(0); }
    .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

    .image-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; }
    .gallery-item {
      border-radius: 13px; overflow: hidden;
      border: 1px solid var(--border); background: var(--surface2);
      transition: transform 0.2s, box-shadow 0.2s;
      animation: slideIn 0.4s ease;
    }
    .gallery-item:hover { transform: translateY(-4px); box-shadow: 0 10px 36px rgba(56,189,248,0.2); }
    .gallery-item img { width: 100%; display: block; aspect-ratio: 1; object-fit: cover; }
    .gallery-item-footer { padding: 9px 12px; display: flex; align-items: center; justify-content: space-between; }
    .gallery-style-badge { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 100px; }
    .badge-realistic  { background: rgba(56,189,248,0.15);  color: var(--accent); }
    .badge-anime      { background: rgba(244,114,182,0.15); color: var(--accent3); }
    .badge-animation  { background: rgba(129,140,248,0.15); color: var(--accent2); }
    .image-download   { color: var(--accent); text-decoration: none; font-size: 12px; font-weight: 600; }

    .image-loading {
      aspect-ratio: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 14px;
      background: var(--surface2); border: 1px solid var(--border); border-radius: 13px;
    }
    .spinner {
      width: 44px; height: 44px;
      border: 3px solid rgba(56,189,248,0.2); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner-text { color: var(--text-muted); font-size: 13px; }

    /* ── Toast ──────────────────────────────────── */
    .toast {
      position: fixed; bottom: 80px; left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: #1a0a0a; border: 1px solid rgba(239,68,68,0.4);
      color: #fca5a5; padding: 11px 22px; border-radius: 100px;
      font-size: 13px; font-weight: 600; z-index: 1000;
      transition: transform 0.3s ease; white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ── Error bubble in chat ───────────────────── */
    .error-bubble {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 12px; padding: 12px 16px;
      color: #fca5a5; font-size: 14px; line-height: 1.6;
      align-self: center; max-width: 90%; text-align: center;
      animation: slideIn 0.3s ease;
    }

    /* ── Status bar ─────────────────────────────── */
    .status-bar {
      display: none;
      padding: 8px 16px;
      background: rgba(56,189,248,0.08);
      border-bottom: 1px solid var(--border);
      font-size: 12px; color: var(--accent);
      text-align: center; flex-shrink: 0;
    }
    .status-bar.show { display: block; }

    /* ── Mobile overrides ───────────────────────── */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .tab-bar { padding: 10px 12px 0; }
      .tab { padding: 9px 14px; font-size: 13px; }
      .messages { padding: 14px; gap: 14px; }
      .bubble { font-size: 14px; padding: 10px 14px; }
      .message { max-width: 95%; }
      .input-area { padding: 10px 12px; padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
      .image-panel-content { padding: 14px; gap: 14px; }
      .style-selector { gap: 8px; }
      .style-card { padding: 12px 8px; }
      .style-card .style-icon { font-size: 22px; }
      .style-card .style-name { font-size: 12px; }
      .style-card .style-desc { display: none; }
      .image-gallery { grid-template-columns: 1fr 1fr; gap: 10px; }
    }
  </style>
</head>
<body>
<div class="app-shell">

  <!-- Sidebar (desktop only) -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon">✦</div>
        <div class="logo-text">نيورا AI</div>
      </div>
      <button class="new-chat-btn" onclick="clearChat()">✏️ محادثة جديدة</button>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-title">الأدوات</div>
      <div class="nav-item active" onclick="switchTab('chat')">💬 المحادثة</div>
      <div class="nav-item" onclick="switchTab('image')">🎨 إنشاء صور</div>
      <div class="nav-section-title">النماذج</div>
      <div class="nav-item">🔑 GPT-4o Mini</div>
      <div class="nav-item">🖼️ DALL·E 3 HD</div>
    </nav>
    <div class="sidebar-footer">مدعوم بواجهة OpenAI API</div>
  </aside>

  <!-- Main -->
  <main class="main">

    <!-- Tab bar -->
    <div class="tab-bar">
      <div class="tab active" id="tab-chat"  onclick="switchTab('chat')">💬 المحادثة</div>
      <div class="tab"        id="tab-image" onclick="switchTab('image')">🎨 إنشاء صور</div>
    </div>

    <!-- ── Chat panel ── -->
    <div class="panel active" id="panel-chat">
      <div class="status-bar" id="status-bar"></div>
      <div class="messages" id="messages">
        <div class="welcome" id="welcome">
          <div class="welcome-orb">✦</div>
          <h2>مرحباً، كيف يمكنني مساعدتك؟</h2>
          <p>اسألني أي شيء — أنا هنا للمساعدة دائماً</p>
          <div class="suggestion-chips">
            <div class="chip" onclick="sendSuggestion('ما هي أحدث اتجاهات الذكاء الاصطناعي؟')">🤖 اتجاهات الذكاء الاصطناعي</div>
            <div class="chip" onclick="sendSuggestion('اكتب لي قصيدة عن الفضاء')">🌌 قصيدة عن الفضاء</div>
            <div class="chip" onclick="sendSuggestion('علمني برمجة Python للمبتدئين')">💻 تعلم Python</div>
            <div class="chip" onclick="sendSuggestion('ما هي نصائحك لزيادة الإنتاجية؟')">⚡ نصائح الإنتاجية</div>
          </div>
        </div>
      </div>

      <div class="input-area">
        <div class="input-wrapper">
          <textarea id="chat-input" placeholder="اكتب رسالتك هنا..." rows="1"
            onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
          <button class="send-btn" id="send-btn" onclick="sendMessage()">➤</button>
        </div>
      </div>
    </div>

    <!-- ── Image panel ── -->
    <div class="panel" id="panel-image">
